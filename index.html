<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTV</title>
    <link rel="stylesheet" href="style.css">
    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"
    />
</head>
<body>

    <header>
        <p>-20% sur ton abonnement premium ! 💰</p>
        <h1>Marre de payer trop cher !</h1>
    </header>

    <main>
        <div class="carousel-container">
            <h2>Imagine tous ces services de streaming...</h2>
            
            <div class="swiper mySwiper">
                <div class="swiper-wrapper">
                    <div class="swiper-slide">
                        <img src="assets/img/logo/netflix2.png" alt="Logo Netflix">
                    </div>
                    <div class="swiper-slide">
                        <img src="assets/img/logo/prime.png" alt="Logo Prime Video">
                    </div>
                    <div class="swiper-slide">
                        <img src="assets/img/logo/apple.png" alt="Logo Apple TV +">
                    </div>
                    <div class="swiper-slide">
                        <img src="assets/img/logo/canal.png" alt="Logo Canal+ Cinéma">
                    </div>
                    <div class="swiper-slide">
                        <img src="assets/img/logo/bein.png" alt="Logo Bein">
                    </div>
                    <div class="swiper-slide">
                        <img src="assets/img/logo/disney.png" alt="Logo Disney +">
                    </div>
                    <div class="swiper-slide">
                        <img src="assets/img/logo/ocs.png" alt="Logo OCS">
                    </div>
                    <div class="swiper-slide">
                        <img src="assets/img/logo/hbo.png" alt="Logo HBO">
                    </div>
                    <div class="swiper-slide">
                        <img src="assets/img/logo/wakanim.png" alt="Logo Wakanim">
                    </div>
                </div>
                <div class="swiper-pagination"></div>
            </div>

        </div>
    </main>

<img src="assets/img/logo/ocs.png" alt="Logo OCS"> -->

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="index.js"></script>
</body>
</html>
